<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamia's Diary</title>
</head>
<body>

    <h1>Lingo Diary</h1>

    <section>
        <h3>1. Arabic Draft</h3>
        <textarea placeholder="Write in Arabic..." rows="4" style="width:90%"></textarea>

        <h3>2. English Version</h3>
        <textarea placeholder="Write in English..." rows="4" style="width:90%"></textarea>

        <h3>3. Corrected Version</h3>
        <textarea placeholder="Paste corrected text here..." rows="4" style="width:90%"></textarea>
    </section>

    <hr>

    <section>
        <h3>Daily Checklist</h3>
        <input type="checkbox"> Did I write today?<br>
        <input type="checkbox"> Did I translate?<br>
        <input type="checkbox"> Did I learn new words?<br>
        <input type="checkbox"> Did I read aloud?
    </section>

    <br>
    <button>Save Journal Entry</button>

</body>
</html>
