<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom English 🌸</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f3e7e9 0%, #e3eeff 100%);
            --purple-prime: #6c5ce7;
            --glass-white: rgba(255, 255, 255, 0.45);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .main-layout {
            background: var(--glass-white);
            width: 94vw;
            height: 90vh;
            max-width: 1100px;
            border-radius: 40px;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: grid;
            grid-template-columns: 80px 1fr;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
        }

        .side-nav {
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 35px;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .content-area {
            padding: 30px 50px;
            overflow-y: auto;
        }

        h1 { font-size: 2.2rem; color: #2d3436; margin-bottom: 20px; font-weight: 700; }

        .input-group {
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--purple-prime);
            margin-bottom: 5px;
            font-weight: 600;
        }

        textarea, input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
            color: #2d3436;
            font-family: inherit;
        }

        .action-btn {
            background: var(--purple-prime);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
        }

        /* البطاقات التعليمية */
        .vault-section { margin-top: 40px; }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .vocab-card {
            background: white;
            height: 100px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
            font-weight: 600;
            color: var(--purple-prime);
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-layout">
        <aside class="side-nav">
            <div style="font-size: 1.8rem;">🌸</div>
            <div>🖋️</div>
            <div>💎</div>
            <div>⚙️</div>
        </aside>

        <main class="content-area">
            <h1>Bloom English 🌸</h1>
            
            <div class="input-group">
                <label>🖋️ Arabic Thoughts</label>
                <textarea id="ar" rows="2" placeholder="اكتبي فضفضتك هنا..."></textarea>
            </div>

            <div class="input-group">
                <label>🇺🇸 My English Attempt</label>
                <textarea id="en" rows="2" placeholder="Express it in English..."></textarea>
            </div>

            <div class="input-group" style="background: rgba(108, 92, 231, 0.05);">
                <label>✨ AI Correction</label>
                <textarea id="ai" rows="2" placeholder="Paste the polished version here..."></textarea>
            </div>

            <button class="action-btn" onclick="saveAll()">Save Today's Progress ✨</button>

            <div class="vault-section">
                <h2 style="color: #2d3436; font-size: 1.2rem;">Vocabulary Vault 💎</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="word" placeholder="Word" style="background: white; border-radius: 10px; padding: 10px;">
                    <input type="text" id="mean" placeholder="Meaning" style="background: white; border-radius: 10px; padding: 10px;">
                    <button onclick="addCard()" style="background: var(--purple-prime); color: white; border: none; border-radius: 10px; padding: 0 15px;">+</button>
                </div>
                <div id="cardsGrid" class="cards-grid"></div>
            </div>
        </main>
    </div>

    <script>
        function saveAll() {
            localStorage.setItem('bloom_ar', document.getElementById('ar').value);
            localStorage.setItem('bloom_en', document.getElementById('en').value);
            localStorage.setItem('bloom_ai', document.getElementById('ai').value);
            alert("Saved! You are doing great, Lamia. 🌸");
        }

        function addCard() {
            const w = document.getElementById('word').value;
            const m = document.getElementById('mean').value;
            if(!w || !m) return;
            let cards = JSON.parse(localStorage.getItem('bloom_cards') || '[]');
            cards.push({w, m});
            localStorage.setItem('bloom_cards', JSON.stringify(cards));
            render();
            document.getElementById('word').value = '';
            document.getElementById('mean').value = '';
        }

        function render() {
            const grid = document.getElementById('cardsGrid');
            const cards = JSON.parse(localStorage.getItem('bloom_cards') || '[]');
            grid.innerHTML = cards.map((c, i) => `
                <div class="vocab-card" onclick="alert('${c.m}')">${c.w}</div>
            `).join('');
        }

        window.onload = function() {
            document.getElementById('ar').value = localStorage.getItem('bloom_ar') || '';
            document.getElementById('en').value = localStorage.getItem('bloom_en') || '';
            document.getElementById('ai').value = localStorage.getItem('bloom_ai') || '';
            render();
        };
    </script>
</body>
</html>
