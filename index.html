<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom English 🌸</title>
    <style>
        :root {
            /* تدرجات الألوان المستوحاة من صورتك */
            --bg-gradient: linear-gradient(135deg, #f3e7e9 0%, #e3eeff 99%, #e3eeff 100%);
            --accent-glow: radial-gradient(circle at 10% 20%, rgba(253, 203, 110, 0.3) 0%, rgba(224, 195, 252, 0.3) 90%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --text-main: #2d3436;
            --purple-prime: #6c5ce7;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* دوائر ملونة في الخلفية لتعزيز شكل الـ Glassmorphism */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: #fab1a0;
            filter: blur(80px);
            top: -50px;
            left: -50px;
            z-index: -1;
        }

        .main-layout {
            background: var(--glass-bg);
            width: 92vw;
            height: 88vh;
            max-width: 1100px;
            border-radius: 35px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 80px 1fr;
            overflow: hidden;
        }

        /* قائمة أيقونات جانبية بسيطة */
        .side-nav {
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            gap: 30px;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .content-area {
            padding: 40px;
            overflow-y: auto;
        }

        h1 { font-size: 1.8rem; color: var(--purple-prime); margin-bottom: 25px; }

        .input-group {
            background: rgba(255, 255, 255, 0.6);
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
            color: var(--text-main);
            resize: none;
        }

        .action-btn {
            background: var(--purple-prime);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        /* قسم البطاقات في الأسفل */
        .vault-title { margin-top: 40px; font-weight: 600; }
        
        .cards-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 20px 0;
        }

        .vocab-card {
            min-width: 140px;
            height: 180px;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid rgba(108, 92, 231, 0.1);
        }

        .vocab-card:hover { transform: translateY(-5px); }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-layout">
        <aside class="side-nav">
            <span style="font-size: 1.5rem;">🌸</span>
            <span>🖋️</span>
            <span>💎</span>
            <span>⚙️</span>
        </aside>

        <main class="content-area">
            <h1>Bloom English</h1>
            
            <div class="input-group">
                <small style="color: #636e72;">Arabic Soul</small>
                <textarea id="ar" rows="3" placeholder="Write here..."></textarea>
            </div>

            <div class="input-group">
                <small style="color: #636e72;">English Version</small>
                <textarea id="en" rows="3" placeholder="Translate..."></textarea>
            </div>

            <button class="action-btn" onclick="save()">Save Journey</button>

            <h3 class="vault-title">Vocabulary Vault 💎</h3>
            <div class="cards-container" id="cardsGrid">
                </div>
        </main>
    </div>

    <script>
        function save() {
            localStorage.setItem('bloom_ar', document.getElementById('ar').value);
            localStorage.setItem('bloom_en', document.getElementById('en').value);
            alert("Your growth has been recorded! ✨");
        }

        // استرجاع البيانات
        window.onload = function() {
            document.getElementById('ar').value = localStorage.getItem('bloom_ar') || '';
            document.getElementById('en').value = localStorage.getItem('bloom_en') || '';
        };
    </script>
</body>
</html>
